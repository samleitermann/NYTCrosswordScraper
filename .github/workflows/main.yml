name: Update NYT Crossword Graph

on:
  schedule:
    # Runs daily at 10:30 UTC.
    # This is 6:30 AM Eastern during daylight saving time
    # and 5:30 AM Eastern during standard time.
    - cron: "30 10 * * *"

  # Allows you to run it manually from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-crossword-graph:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scrape NYT crossword times
        run: |
          cargo run --release -- -t "${{ secrets.NYT_S }}" -s 2016-01-01 data.csv

      - name: Install Python plotting requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r plot/requirements.txt

      - name: Generate crossword graph
        run: |
          mkdir -p assets
          python plot/plot.py data.csv assets/crossword-times.png

      - name: Update README with graph
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          from datetime import datetime, timezone

          readme_path = Path("README.md")
          data_path = Path("data.csv")

          last_scraped = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
          today = datetime.now(timezone.utc).date().isoformat()

          def format_completion_time(seconds: str) -> str:
              try:
                  total = int(seconds)
              except (TypeError, ValueError):
                  return "Invalid recorded time"
              hours, rem = divmod(total, 3600)
              minutes, secs = divmod(rem, 60)
              if hours:
                  return f"{hours:d}:{minutes:02d}:{secs:02d}"
              return f"{minutes:d}:{secs:02d}"

          completion_status = "No entry for today"
          if data_path.exists():
              with data_path.open(newline="") as f:
                  reader = csv.DictReader(f)
                  for row in reader:
                      if row.get("date") == today:
                          cheated = (row.get("cheated") or "").strip().lower() == "true"
                          solve_time = (row.get("solve_time_secs") or "").strip()
                          if cheated:
                              completion_status = "Solved with cheats"
                          elif solve_time:
                              completion_status = format_completion_time(solve_time)
                          else:
                              completion_status = "Not solved yet"
                          break

          graph_markdown = (
              "<!-- crossword-graph:start -->\n"
              "## NYT Crossword Times\n\n"
              "![NYT Crossword Times](assets/crossword-times.png)\n\n"
              f"- **Last scraped (UTC):** {last_scraped}\n"
              f"- **Today’s completion time:** {completion_status}\n\n"
              "_Updated daily by GitHub Actions._\n"
              "<!-- crossword-graph:end -->\n"
          )

          if readme_path.exists():
              readme = readme_path.read_text()
          else:
              readme = "# Crossword\n\n"

          start = "<!-- crossword-graph:start -->"
          end = "<!-- crossword-graph:end -->"

          if start in readme and end in readme:
              before = readme.split(start)[0]
              after = readme.split(end, 1)[1]
              new_readme = before + graph_markdown + after
          else:
              new_readme = readme.rstrip() + "\n\n" + graph_markdown + "\n"

          readme_path.write_text(new_readme)
          PY

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data.csv assets/crossword-times.png README.md

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update crossword data and graph"
            git push
          fi
